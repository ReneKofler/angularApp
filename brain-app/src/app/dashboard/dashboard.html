<div class="dashboard">
  <header>
    <div class="identity">
      <span class="logo">🧠</span>
      <div><strong>BrainApp</strong><small>{{ auth.session()?.user?.email }}</small></div>
    </div>
    <div class="account-actions">
      <span class="version">ⓘ v3.12.0</span>
      <button type="button" aria-label="Profile">◎</button>
      <button type="button" aria-label="Settings">⚙</button>
      <button class="logout" type="button" (click)="auth.signOut()">Abmelden</button>
    </div>
  </header>
  <main>
    <section class="modules" aria-label="BrainApp modules">
      @for (module of modules; track module.name) {
        @if (module.route) {
          <a class="module" [routerLink]="module.route" [style.background]="module.color">
            <span class="icon">{{ module.icon }}</span>
            <strong>{{ module.name }}</strong>
            <span>{{ module.description }}</span>
          </a>
        } @else {
          <article class="module unavailable" [style.--theme-color]="module.color" [attr.aria-label]="module.name + ' – noch nicht verfügbar'">
            <span class="icon">{{ module.icon }}</span>
            <strong>{{ module.name }}</strong>
            <span>{{ module.description }}</span>
          </article>
        }
      }
    </section>
  </main>
</div>
