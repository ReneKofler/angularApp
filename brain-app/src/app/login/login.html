<main class="login-page">
  <form (ngSubmit)="submit()" [formGroup]="form">
    <h1>Anmelden</h1>
    @if (!auth.configured()) {
      <div class="notice">Supabase ist nicht konfiguriert.</div>
    }
    <label>E-Mail
      <input type="email" formControlName="email" autocomplete="email" />
    </label>
    <label>Passwort
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>
    @if (error()) { <p class="error" role="alert">{{ error() }}</p> }
    <button type="submit" [disabled]="pending()">{{ pending() ? 'Anmeldung…' : 'Anmelden' }}</button>
    <p class="help">Kein Zugang? Kontaktiere den Administrator für eine<br />Einladung.</p>
  </form>
</main>
