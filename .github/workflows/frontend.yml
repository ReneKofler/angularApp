name: Frontend

on:
  pull_request:
    paths: ["brain-app/**", ".github/workflows/frontend.yml"]
  push:
    branches: [main]
    paths: ["brain-app/**", ".github/workflows/frontend.yml"]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brain-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: npm
          cache-dependency-path: brain-app/package-lock.json
      - run: npm ci
      - run: npm test -- --watch=false
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            brain-app/playwright-report
            brain-app/test-results
          retention-days: 7
